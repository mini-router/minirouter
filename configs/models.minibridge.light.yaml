# MiniBridge-backed OpenRouter light pool for validator smoke runs and protected
# competition evaluation. The OpenRouter API key lives inside MiniBridge; this
# repo only sends caller/key identity and receives a signed receipt.

minibridge:
  base_url: "https://4f4ea5780387d1611e5231be1efe7c883f3f5102-18081.dstack-pha-prod9.phala.network"
  provider_id: "openrouter-prod"
  caller_id: "minirouter-maintainer"
  owner_id: "minirouter-miners"
  key_id: "minirouter-miners-openrouter-key"
  timeout_s: 60
  max_retries: 3
  max_concurrency: 8
  ttl_s: 300
  ledger_provider: "openrouter"
  reasoning_param: "reasoning_effort"

pool:
  - name: qwen3-coder-30b
    id: "qwen/qwen3-coder-30b-a3b-instruct"
  - name: gpt-oss-120b
    id: "openai/gpt-oss-120b"
  - name: gemma-3-4b
    id: "google/gemma-3-4b-it"
  - name: nemotron-3-ultra
    id: "nvidia/nemotron-3-ultra-550b-a55b"

decoding:
  thinker:   { temperature: 0.7, top_p: 0.95, max_tokens: 4096 }
  worker:    { temperature: 0.2, top_p: 0.95, max_tokens: 4096 }
  verifier:  { temperature: 0.0, top_p: 1.0,  max_tokens: 2048 }
